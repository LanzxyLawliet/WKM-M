<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maulana | Modules & Methodology</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #3b82f6;
            --accent-yellow: #facc15;
            --accent-gold: #eab308;
            --bg-dark: #0a0a0f;
            --surface-dark: #12121a;
            --surface-elevated: #1e1e2a;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-dim: #2d2d3a;
            --card-radius: 1.25rem;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-dark); color: var(--text-light); line-height: 1.5; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
        header { background: var(--surface-dark); border-bottom: 2px solid var(--accent-yellow); position: sticky; top: 0; z-index: 20; }
        nav { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 1.2rem 0; gap: 1rem; }
        .logo a { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-blue), var(--accent-gold)); background-clip: text; -webkit-background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 600; color: var(--text-light); transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-yellow); border-bottom: 2px solid var(--accent-yellow); padding-bottom: 0.25rem; }
        .controls-bar { background: var(--surface-dark); border-radius: 1rem; padding: 1rem 1.5rem; margin: 1.5rem 0 2rem; border: 1px solid var(--border-dim); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
        .search-group { display: flex; gap: 0.5rem; align-items: center; }
        .search-group label { font-weight: 600; color: var(--text-muted); }
        .tag-search { background: var(--surface-elevated); border: 1px solid var(--border-dim); padding: 0.4rem 0.8rem; border-radius: 40px; color: var(--text-light); font-family: inherit; width: 250px; }
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin: 2rem 0 3rem; }
        .module-card { background: var(--surface-dark); border-radius: var(--card-radius); border: 1px solid var(--border-dim); overflow: hidden; transition: all 0.2s; }
        .module-card:hover { transform: translateY(-5px); border-color: var(--accent-yellow); }
        .module-header { padding: 1rem 1.5rem; background: var(--surface-elevated); border-bottom: 1px solid var(--border-dim); }
        .module-title { font-size: 1.3rem; font-weight: 700; color: var(--accent-yellow); }
        .module-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
        .module-content { padding: 1rem 1.5rem; }
        .module-description { color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5; }
        .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
        .tag { background: var(--surface-elevated); padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; font-weight: 500; color: var(--primary-blue); border: 1px solid var(--border-dim); }
        .module-link { display: inline-block; margin-top: 1rem; color: var(--primary-blue); text-decoration: none; font-weight: 600; }
        .module-link:hover { color: var(--accent-yellow); }
        footer { text-align: center; padding: 2rem 0; border-top: 1px solid var(--border-dim); color: var(--text-muted); background: var(--surface-dark); }
        @media (max-width: 720px) { nav { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
<header>
    <div class="container">
        <nav>
            <div class="logo"><a href="index.html">✦ Maulana Rizki</a></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="activities.html">Activities</a>
                <a href="projects.html">Projects</a>
                <a href="modules.html" class="active">Modules</a>
            </div>
        </nav>
    </div>
</header>
<main class="container">
    <h1 style="font-size: 2rem; font-weight: 800; margin: 1.5rem 0 0.5rem; border-left: 5px solid var(--accent-yellow); padding-left: 1rem;">Metodologi & Modul</h1>
    <div class="controls-bar">
        <div class="search-group">
            <label><i class="fas fa-tag"></i> Cari Tag:</label>
            <input type="text" id="tagSearchInput" class="tag-search" placeholder="contoh: Networking, Linux, Security">
        </div>
    </div>
    <div id="modulesContainer" class="modules-grid">
        <div style="text-align:center; padding:2rem;">Memuat...</div>
    </div>
</main>
<footer><div class="container"><p>© 2025 Maulana Rizki Ramadhan — modul & metodologi</p></div></footer>
<script src="modules-script.js"></script>
</body>
</html>

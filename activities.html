<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maulana | Log Aktivitas Harian</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #3b82f6;
            --primary-dark: #1e40af;
            --accent-yellow: #facc15;
            --accent-gold: #eab308;
            --bg-dark: #0a0a0f;
            --surface-dark: #12121a;
            --surface-elevated: #1e1e2a;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-dim: #2d2d3a;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header {
            background: var(--surface-dark);
            border-bottom: 2px solid var(--accent-yellow);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 0;
            gap: 1rem;
        }

        .logo a {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-gold));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: var(--text-light);
            transition: 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-yellow);
            border-bottom: 2px solid var(--accent-yellow);
            padding-bottom: 0.25rem;
        }

        /* filter & sort bar */
        .controls-bar {
            background: var(--surface-dark);
            border-radius: 1rem;
            padding: 1.2rem 1.5rem;
            margin: 1.5rem 0 2rem;
            border: 1px solid var(--border-dim);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--text-muted);
        }

        .filter-btn {
            background: var(--surface-elevated);
            border: 1px solid var(--border-dim);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-light);
        }

        .filter-btn.active {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
            color: white;
        }

        .filter-btn:hover {
            background: var(--primary-dark);
            border-color: var(--accent-yellow);
        }

        .date-picker {
            background: var(--surface-elevated);
            border: 1px solid var(--border-dim);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            color: var(--text-light);
            font-family: inherit;
        }

        .sort-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .sort-btn {
            background: var(--surface-elevated);
            border: 1px solid var(--border-dim);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .sort-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        /* activity cards */
        .activities-log {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 2rem 0 3rem;
        }

        .log-card {
            background: var(--surface-dark);
            border-radius: 1.25rem;
            border: 1px solid var(--border-dim);
            overflow: hidden;
            transition: 0.2s;
        }

        .log-card:hover {
            border-color: var(--accent-yellow);
            transform: translateY(-3px);
        }

        .log-header {
            padding: 1.2rem 1.8rem 0.5rem;
            border-bottom: 1px solid var(--border-dim);
        }

        .log-date {
            font-size: 0.9rem;
            font-weight: 700;
            background: var(--surface-elevated);
            display: inline-block;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            color: var(--accent-yellow);
        }

        .log-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .log-description {
            padding: 0.8rem 1.8rem;
            color: var(--text-muted);
        }

        .gallery-section {
            padding: 0.5rem 1.8rem 1.5rem;
        }

        .gallery-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--primary-blue);
            margin-bottom: 0.8rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            aspect-ratio: 4/3;
            border-radius: 0.8rem;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-dim);
            transition: 0.2s;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item:hover {
            border-color: var(--accent-yellow);
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--surface-dark);
            border-radius: 2rem;
            color: var(--text-muted);
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border-dim);
            margin-top: 2rem;
            color: var(--text-muted);
            background: var(--surface-dark);
        }

        @media (max-width: 720px) {
            nav { flex-direction: column; align-items: flex-start; }
            .controls-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<header>
    <div class="container">
        <nav>
            <div class="logo"><a href="index.html">✦ Maulana Rizki</a></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="activities.html" class="active">Activities</a>
                <a href="projects.html">Projects</a>
            </div>
        </nav>
    </div>
</header>

<main class="container">
    <h1 class="page-title" style="margin-top: 1rem;">Log Aktivitas Harian</h1>
    
    <!-- Filter & Sort Controls -->
    <div class="controls-bar">
        <div class="filter-group">
            <label><i class="fas fa-filter"></i> Filter:</label>
            <button data-filter="day" class="filter-btn">Hari Ini</button>
            <button data-filter="week" class="filter-btn">Minggu Ini</button>
            <button data-filter="month" class="filter-btn">Bulan Ini</button>
            <input type="date" id="customDatePicker" class="date-picker" value="">
            <button id="applyCustomDate" class="filter-btn">Pilih Tanggal</button>
            <button id="resetFilter" class="filter-btn">Reset Filter</button>
        </div>
        <div class="sort-group">
            <label><i class="fas fa-sort"></i> Urut:</label>
            <button id="sortNewest" class="sort-btn active">Terbaru ↓</button>
            <button id="sortOldest" class="sort-btn">Terlama ↑</button>
        </div>
    </div>

    <div id="activitiesContainer" class="activities-log">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Memuat data...</div>
    </div>
</main>

<footer>
    <div class="container">
        <p>© 2025 Maulana Rizki Ramahan — catatan harian magang & dokumentasi</p>
    </div>
</footer>

<!-- Lightbox modal -->
<div id="lightbox" class="lightbox" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000;">
    <span id="closeLightbox" style="position: absolute; top: 2rem; right: 2rem; font-size: 2.5rem; cursor: pointer; color: white;">&times;</span>
    <img id="lightboxImg" style="max-width: 85%; max-height: 85%; border-radius: 1rem; border: 2px solid var(--accent-yellow);">
</div>

<script src="activities-script.js"></script>
</body>
</html>

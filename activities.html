<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Maulana | Log Aktivitas Harian</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #3b82f6;
            --primary-dark: #1e40af;
            --accent-yellow: #facc15;
            --accent-gold: #eab308;
            --bg-dark: #0a0a0f;
            --surface-dark: #12121a;
            --surface-elevated: #1e1e2a;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-dim: #2d2d3a;
            --card-radius: 1.25rem;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-dark); color: var(--text-light); line-height: 1.5; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
        header { background: var(--surface-dark); border-bottom: 2px solid var(--accent-yellow); position: sticky; top: 0; z-index: 20; }
        nav { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 1.2rem 0; gap: 1rem; }
        .logo a { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-blue), var(--accent-gold)); background-clip: text; -webkit-background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 600; color: var(--text-light); transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-yellow); border-bottom: 2px solid var(--accent-yellow); padding-bottom: 0.25rem; }
        .controls-bar { background: var(--surface-dark); border-radius: 1rem; padding: 1rem 1.5rem; margin: 1.5rem 0 2rem; border: 1px solid var(--border-dim); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
        .filter-group, .sort-group { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        .filter-group label, .sort-group label { font-weight: 600; color: var(--text-muted); }
        .filter-btn, .sort-btn { background: var(--surface-elevated); border: 1px solid var(--border-dim); padding: 0.4rem 1rem; border-radius: 40px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-light); }
        .filter-btn.active, .sort-btn.active { background: var(--primary-blue); border-color: var(--primary-blue); color: white; }
        .filter-btn:hover, .sort-btn:hover { background: var(--primary-dark); border-color: var(--accent-yellow); }
        .date-picker { background: var(--surface-elevated); border: 1px solid var(--border-dim); padding: 0.4rem 0.8rem; border-radius: 40px; color: var(--text-light); font-family: inherit; }
        .activities-log { display: flex; flex-direction: column; gap: 1.5rem; margin: 1rem 0 2rem; }
        .log-card { background: var(--surface-dark); border-radius: var(--card-radius); border: 1px solid var(--border-dim); overflow: hidden; transition: all 0.2s ease; }
        .log-card:hover { border-color: var(--accent-yellow); transform: translateY(-2px); }
        .card-compact { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; padding: 1rem 1.5rem; cursor: pointer; background: var(--surface-dark); transition: background 0.2s; }
        .card-compact:hover { background: var(--surface-elevated); }
        .date-badge { background: var(--surface-elevated); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.85rem; font-weight: 600; color: var(--accent-yellow); white-space: nowrap; }
        .title-preview { flex: 2; font-weight: 600; font-size: 1.1rem; }
        .short-desc { flex: 3; color: var(--text-muted); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .thumbnail-preview { width: 48px; height: 48px; border-radius: 0.5rem; object-fit: cover; background: var(--surface-elevated); border: 1px solid var(--border-dim); }
        .expand-icon { color: var(--primary-blue); font-size: 1.2rem; }
        .detail-panel { display: none; padding: 1rem 1.8rem 1.8rem; border-top: 1px solid var(--border-dim); background: var(--surface-elevated); }
        .detail-panel.open { display: block; }
        .full-description { margin-bottom: 1.5rem; line-height: 1.6; color: var(--text-light); }
        .full-description h1, .full-description h2, .full-description h3 { margin: 1rem 0 0.5rem; color: var(--accent-yellow); }
        .full-description p { margin: 0.5rem 0; }
        .full-description ul, .full-description ol { margin: 0.5rem 0 0.5rem 1.5rem; }
        .full-description li { margin: 0.2rem 0; }
        .full-description strong { color: var(--primary-blue); }
        .full-description em { color: var(--accent-gold); }
        .full-description code { background: var(--bg-dark); padding: 0.2rem 0.4rem; border-radius: 6px; font-family: monospace; }
        .full-description pre { background: var(--bg-dark); padding: 0.8rem; border-radius: 0.8rem; overflow-x: auto; }
        .gallery-title { font-size: 0.85rem; text-transform: uppercase; color: var(--primary-blue); margin-bottom: 0.8rem; letter-spacing: 1px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.8rem; }
        .gallery-item { aspect-ratio: 4/3; border-radius: 0.6rem; overflow: hidden; cursor: pointer; border: 1px solid var(--border-dim); transition: 0.2s; background: var(--surface-dark); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gallery-item:hover { border-color: var(--accent-yellow); transform: scale(1.02); }
        .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
        .tag { background: var(--surface-dark); padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; font-weight: 500; color: var(--primary-blue); border: 1px solid var(--border-dim); }
        .load-more-container { text-align: center; margin: 2rem 0 3rem; }
        .load-more-btn { background: var(--surface-elevated); border: 1px solid var(--border-dim); padding: 0.7rem 2rem; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; color: var(--text-light); }
        .load-more-btn:hover { background: var(--primary-blue); border-color: var(--primary-blue); }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; z-index: 1000; }
        .lightbox img { max-width: 85%; max-height: 85%; border-radius: 1rem; border: 2px solid var(--accent-yellow); }
        .close-lightbox { position: absolute; top: 2rem; right: 2rem; font-size: 2.5rem; color: white; cursor: pointer; }
        footer { text-align: center; padding: 2rem 0; border-top: 1px solid var(--border-dim); color: var(--text-muted); background: var(--surface-dark); }
        @media (max-width: 720px) {
            .card-compact { flex-wrap: wrap; gap: 0.5rem; }
            .short-desc { white-space: normal; width: 100%; order: 3; }
            .thumbnail-preview { order: 2; }
            .expand-icon { order: 4; }
            .controls-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<header>
    <div class="container">
        <nav>
            <div class="logo"><a href="index.html">✦ Maulana Rizki</a></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="activities.html" class="active">Activities</a>
                <a href="projects.html">Projects</a>
            </div>
        </nav>
    </div>
</header>

<main class="container">
    <h1 style="font-size: 2rem; font-weight: 800; margin: 1.5rem 0 0.5rem; border-left: 5px solid var(--accent-yellow); padding-left: 1rem;">Log Aktivitas Harian</h1>
    <div class="controls-bar">
        <div class="filter-group">
            <label><i class="fas fa-filter"></i> Filter:</label>
            <button data-filter="day" class="filter-btn">Hari Ini</button>
            <button data-filter="week" class="filter-btn">Minggu Ini</button>
            <button data-filter="month" class="filter-btn">Bulan Ini</button>
            <input type="date" id="customDatePicker" class="date-picker">
            <button id="applyCustomDate" class="filter-btn">Pilih Tanggal</button>
            <button id="resetFilter" class="filter-btn">Reset</button>
        </div>
        <div class="sort-group">
            <label><i class="fas fa-sort"></i> Urut:</label>
            <button id="sortNewest" class="sort-btn active">Terbaru ↓</button>
            <button id="sortOldest" class="sort-btn">Terlama ↑</button>
        </div>
    </div>
    <div id="activitiesContainer" class="activities-log"><div class="empty-state" style="text-align:center; padding:2rem;">Memuat...</div></div>
    <div id="loadMoreContainer" class="load-more-container"></div>
</main>

<footer><div class="container"><p>© 2025 Maulana Rizki Ramahan — catatan harian magang</p></div></footer>

<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>
    <img id="lightboxImg" src="" alt="preview">
</div>

<script src="activities-script.js"></script>
</body>
</html>
